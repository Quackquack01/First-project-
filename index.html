<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Library</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
    <h1>🤖 AI Prompt Library</h1>

    <button id="themeToggle" aria-label="Toggle Theme">
        🌙
    </button>

    <div id="themeReveal"></div>
</header>

    <main>

        <input
            type="text"
            id="search"
            placeholder="Search prompts..."
        >

        <div class="categories">
            <button>All</button>
            <button>Writing</button>
            <button>Coding</button>
            <button>Study</button>
            <button>Business</button>
        </div>

        <div id="promptContainer">

            <div class="card" data-category="writing">
    <h2>Professional Email</h2>
    <p>Write a professional email from the following points.</p>

    <div class="actions">
        <button class="copyBtn">📋 Copy</button>
        <button class="favBtn">🤍</button>
    </div>
</div>

        </div>

    </main>

    <div id="toast">
    ✅ Prompt copied!
</div>
<script src="script.js"></script>

</body>
</html>
