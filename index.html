<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Library</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
    <div class="logo">
    <img src="assets/logo.svg" alt="AI Prompt Library Logo">
    <h1>AI Prompt Library</h1>
</div>

    <button id="themeToggle" aria-label="Toggle Theme">
        🌙
    </button>

    <div id="themeReveal"></div>
</header>

    <main>

        <input
            type="text"
            id="search"
            placeholder="Search prompts..."
        >

        <div class="categories">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="writing">Writing</button>
    <button class="filter" data-filter="coding">Coding</button>
    <button class="filter" data-filter="study">Study</button>
    <button class="filter" data-filter="business">Business</button>
</div>

        <div id="promptContainer">

            <div class="card" data-category="writing">
    <h2>Professional Email</h2>
    <p>Write a professional email from the following points.</p>

    <div class="actions">
        <button class="copyBtn">📋 Copy</button>
        <button class="favBtn">🤍</button>
    </div>
</div>

        </div>

    </main>

    <div id="toast">
    ✅ Prompt copied!
</div>
<footer>
    <p>Made with ❤️ for the AI community</p>

    <a href="https://github.com/Quackquack01/First-project-" target="_blank">
        ⭐ View on GitHub
    </a>
</footer>
<script src="script.js"></script>

</body>
</html>
